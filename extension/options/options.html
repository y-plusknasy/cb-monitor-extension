<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        max-width: 520px;
        margin: 0 auto;
        padding: 24px 16px;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        font-size: 14px;
        color: #1f2937;
        background: #f9fafb;
      }

      /* ── ヘッダー ── */
      .page-header {
        font-size: 20px;
        font-weight: 700;
        color: #1a73e8;
        margin-bottom: 24px;
      }

      /* ── セクション ── */
      .section {
        background: #fff;
        border: 1px solid #e5e7eb;
        border-radius: 8px;
        padding: 20px;
        margin-bottom: 16px;
      }
      .section-title {
        font-size: 14px;
        font-weight: 600;
        color: #374151;
        margin-bottom: 16px;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .section-icon {
        font-size: 16px;
      }

      /* ── ペアリング状態カード ── */
      .status-card {
        padding: 16px;
        border-radius: 6px;
        font-size: 13px;
      }
      .status-card.paired {
        background: #ecfdf5;
        border: 1px solid #a7f3d0;
      }
      .status-card.unpaired {
        background: #fffbeb;
        border: 1px solid #fde68a;
        color: #92400e;
      }
      .status-badge {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        font-weight: 600;
        margin-bottom: 12px;
      }
      .status-badge.paired {
        color: #059669;
      }
      .status-badge.unpaired {
        color: #d97706;
      }

      .info-grid {
        display: grid;
        grid-template-columns: auto 1fr;
        gap: 6px 12px;
        font-size: 13px;
      }
      .info-label {
        color: #6b7280;
      }
      .info-value {
        color: #1f2937;
        word-break: break-all;
      }

      /* ── デバイス名編集 ── */
      .device-name-display {
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .device-name-text {
        font-weight: 500;
      }
      .edit-btn {
        background: none;
        border: none;
        cursor: pointer;
        font-size: 14px;
        color: #6b7280;
        padding: 2px 4px;
        border-radius: 4px;
      }
      .edit-btn:hover {
        background: #f3f4f6;
        color: #1a73e8;
      }
      .device-name-edit {
        display: none;
        align-items: center;
        gap: 8px;
      }
      .device-name-edit input {
        flex: 1;
        padding: 4px 8px;
        border: 1px solid #d1d5db;
        border-radius: 4px;
        font-size: 13px;
      }
      .device-name-edit input:focus {
        outline: none;
        border-color: #1a73e8;
        box-shadow: 0 0 0 2px rgba(26, 115, 232, 0.2);
      }
      .btn-sm {
        padding: 4px 12px;
        font-size: 12px;
        border: none;
        border-radius: 4px;
        cursor: pointer;
      }
      .btn-sm.primary {
        background: #1a73e8;
        color: #fff;
      }
      .btn-sm.primary:hover {
        background: #1557b0;
      }
      .btn-sm.secondary {
        background: #f3f4f6;
        color: #374151;
      }
      .btn-sm.secondary:hover {
        background: #e5e7eb;
      }

      /* ── フォーム ── */
      .form-group {
        margin-bottom: 14px;
      }
      label {
        display: block;
        font-weight: 500;
        margin-bottom: 4px;
        font-size: 13px;
        color: #374151;
      }
      .help-text {
        font-size: 12px;
        color: #9ca3af;
        margin-bottom: 6px;
      }
      input[type="url"],
      input[type="text"] {
        width: 100%;
        padding: 8px 12px;
        border: 1px solid #d1d5db;
        border-radius: 6px;
        font-size: 14px;
      }
      input[type="url"]:focus,
      input[type="text"]:focus {
        outline: none;
        border-color: #1a73e8;
        box-shadow: 0 0 0 2px rgba(26, 115, 232, 0.2);
      }
      .btn {
        padding: 8px 24px;
        background: #1a73e8;
        color: #fff;
        border: none;
        border-radius: 6px;
        font-size: 14px;
        cursor: pointer;
        font-weight: 500;
      }
      #repairing-form > .btn {
        min-width: 7em;
        margin-right: 5px;
        text-align: center;
      }
      .btn:hover {
        background: #1557b0;
      }
      .btn:disabled {
        background: #d1d5db;
        cursor: not-allowed;
      }

      /* ── メッセージ ── */
      .message {
        margin-top: 12px;
        padding: 10px 14px;
        border-radius: 6px;
        font-size: 13px;
        display: none;
      }
      .message.success {
        display: block;
        background: #ecfdf5;
        color: #065f46;
        border: 1px solid #a7f3d0;
      }
      .message.error {
        display: block;
        background: #fef2f2;
        color: #991b1b;
        border: 1px solid #fecaca;
      }

      /* ── 折りたたみセクション ── */
      .collapsible-header {
        display: flex;
        align-items: center;
        gap: 6px;
        width: 100%;
        background: none;
        border: none;
        cursor: pointer;
        font-size: 14px;
        font-weight: 600;
        color: #374151;
        padding: 0;
        margin-bottom: 0;
      }
      .collapsible-header:hover {
        color: #1a73e8;
      }
      .collapse-icon {
        font-size: 10px;
        transition: transform 0.2s;
      }
      .collapsible-header.open .collapse-icon {
        transform: rotate(90deg);
      }
      .collapsible-body {
        display: none;
        margin-top: 16px;
      }
      .collapsible-body.open {
        display: block;
      }
    </style>
  </head>
  <body>
    <div class="page-header">CB Link — 設定</div>

    <!-- ペアリング状態 -->
    <div class="section">
      <div class="section-title">
        <span class="section-icon">🔗</span>
        デバイス登録状態
      </div>

      <!-- 登録済み表示 -->
      <div id="paired-view" style="display: none">
        <div class="status-card paired">
          <div class="status-badge paired">✓ 登録済み</div>
          <div class="info-grid">
            <span class="info-label">デバイス名</span>
            <span class="info-value">
              <span class="device-name-display" id="device-name-display">
                <span class="device-name-text" id="device-name-text"></span>
                <button
                  class="edit-btn"
                  id="edit-name-btn"
                  title="デバイス名を編集"
                >
                  ✎
                </button>
              </span>
              <span class="device-name-edit" id="device-name-edit">
                <input type="text" id="device-name-input" maxlength="100" />
                <button class="btn-sm primary" id="save-name-btn">保存</button>
                <button class="btn-sm secondary" id="cancel-name-btn">
                  取消
                </button>
              </span>
            </span>
            <span class="info-label">登録日</span>
            <span class="info-value" id="paired-date">-</span>
            <span class="info-label">デバイスID</span>
            <span class="info-value" id="paired-device-id">-</span>
          </div>
        </div>
        <div id="name-edit-message" class="message"></div>

        <!-- 追加ペアリング（別の保護者と紐付け） -->
        <div style="margin-top: 16px">
          <button
            class="btn"
            id="show-repairing-btn"
            style="background: #6b7280; width: 100%"
          >
            ワンタイムパスワードを入力
          </button>
        </div>
        <div
          id="repairing-form-container"
          style="display: none; margin-top: 16px"
        >
          <div class="help-text" style="margin-bottom: 12px">
            別の保護者アプリと連携するには、新しい OTP
            を入力してください。デバイスIDはそのまま使用します。
          </div>
          <form id="repairing-form">
            <div class="form-group">
              <label for="repairing-otp-code">ワンタイムパスコード (OTP)</label>
              <input
                type="text"
                id="repairing-otp-code"
                placeholder="123456"
                required
                pattern="\d{6}"
                maxlength="6"
                inputmode="numeric"
              />
            </div>
            <button type="submit" id="repairing-btn" class="btn">登録</button>
            <button type="button" id="repairing-cancel-btn" class="btn">
              キャンセル
            </button>
          </form>
          <div id="repairing-message" class="message"></div>
        </div>
      </div>

      <!-- 未登録時：OTP入力フォーム -->
      <div id="unpaired-view" style="display: none">
        <div class="status-card unpaired">
          <div class="status-badge unpaired">⚠ 未登録</div>
          <div>
            保護者のアプリで発行されたコードを入力して、このデバイスを登録してください。
          </div>
        </div>
        <form id="pairing-form" style="margin-top: 16px">
          <div class="form-group">
            <label for="device-name">デバイス名</label>
            <div class="help-text">
              このデバイスを識別する名前（例: 「子供の Chromebook」）
            </div>
            <input
              type="text"
              id="device-name"
              placeholder="Chromebook（子供）"
              required
              maxlength="100"
            />
          </div>
          <div class="form-group">
            <label for="otp-code">ワンタイムパスコード (OTP)</label>
            <div class="help-text">
              保護者のアプリで発行された 6 桁のコードを入力してください
            </div>
            <input
              type="text"
              id="otp-code"
              placeholder="123456"
              required
              pattern="\d{6}"
              maxlength="6"
              inputmode="numeric"
            />
          </div>
          <button type="submit" id="register-btn" class="btn">登録</button>
        </form>
        <div id="pairing-message" class="message"></div>
      </div>
    </div>

    <!-- ========== DEV ONLY: 開発環境エミュレーター接続用 START ========== -->
    <!-- 本番環境では本セクションごと削除すること。
         本番 Firebase Functions エンドポイントは constants.js で固定する。 -->
    <div class="section">
      <button class="collapsible-header" id="advanced-toggle">
        <span class="collapse-icon">▶</span>
        <span class="section-icon">⚙</span>
        詳細設定
      </button>
      <div class="collapsible-body" id="advanced-body">
        <form id="settings-form">
          <div class="form-group">
            <label for="api-endpoint">API エンドポイント</label>
            <div class="help-text">
              Firebase Functions の usageLogs URL を入力してください
            </div>
            <input
              type="url"
              id="api-endpoint"
              placeholder="https://us-central1-your-project.cloudfunctions.net/usageLogs"
              required
            />
          </div>
          <button type="submit" class="btn">保存</button>
        </form>
        <div id="message" class="message"></div>
      </div>
    </div>
    <!-- ========== DEV ONLY: 開発環境エミュレーター接続用 END ========== -->

    <script src="options.js" type="module"></script>
  </body>
</html>
