name: Deploy

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  # ── Firebase Functions デプロイ ──
  deploy-functions:
    name: Deploy Functions
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: functions
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: functions/package-lock.json

      - run: npm ci

      - run: npm run build

      - run: npm test

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - run: npx firebase-tools deploy --only functions --force

  # ── Extension zip ビルド ──
  build-extension:
    name: Build Extension Zip
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: extension
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: extension/package-lock.json

      - run: npm ci

      - run: npm test

      - run: node scripts/build.js

      - name: Upload extension zip as artifact
        uses: actions/upload-artifact@v4
        with:
          name: extension-zip
          path: build/cb-link-extension-v*.zip

  # ── GitHub Release 作成 ──
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-extension]
    steps:
      - uses: actions/checkout@v4

      - name: Download extension zip
        uses: actions/download-artifact@v4
        with:
          name: extension-zip
          path: artifacts

      - name: Create Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          gh release create "$TAG" \
            --title "CB Link $TAG" \
            --generate-notes \
            artifacts/cb-link-extension-v*.zip

  # ── GitHub Pages デプロイ ──
  deploy-pages:
    name: Deploy GitHub Pages
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs-site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
