name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  functions-ci:
    name: Functions — Build / Lint / Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: functions
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: functions/package-lock.json

      - run: npm ci

      - run: npm run build

      - run: npm run lint

      - run: npm test

  extension-ci:
    name: Extension — Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: extension
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: extension/package-lock.json

      - run: npm ci

      - run: npm test

  mobile-ci:
    name: Mobile — Type Check / Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - run: npm ci

      - run: npx tsc --noEmit

      - run: npm test -- --passWithNoTests
