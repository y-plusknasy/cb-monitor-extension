name: CI — Mobile

on:
  push:
    branches: [main]
    paths:
      - "mobile/**"
  pull_request:
    branches: [main]
    paths:
      - "mobile/**"

jobs:
  mobile-ci:
    name: Mobile — Type Check / Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - run: npm ci

      - run: npx tsc --noEmit

      - run: npm test -- --passWithNoTests
